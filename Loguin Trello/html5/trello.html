<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interface de login do Trello</title>

  <script src="https://unpkg.com/@codans/trello"></script>
  
</head>

<body>

  <img src="/img/trello.svg" alt="Logo Trello" width="200">



  <h1>Fazer login no Trello</h1>

  <form action="" method="get">

    <input type="text" name="email" placeholder="Insira seu E-mail">
    <input type="senha" name="senha" placeholder="Insira sua Senha">
    <input type="submit" value="Fazer Login" name="enviar">



    <span>Ou</span>


    <button type="submit" name="btn-google">
      <img src="/img/google.svg" alt="Logo Google" width="20">
      Continuar com o Google
    </button>

    <button type="submit" name="btn-microsoft">
      <img src="/img/microsoft.svg" alt="Logo Microsoft" width="20">
      Continuar com a Microsoft
    </button>

    <button type="submit" name="btn-apple">
      <img src="/img/apple.svg" alt="Logo Apple" width="20">
      Continuar com a Apple
    </button>

    <button type="submit" name="btn-slack">
      <img src="/img/slack.svg" alt="Logo Slack" width="20">
      Continuar com a Slack
    </button>
  </form>

  <img src="/img/atlassian.svg" alt="Imagem Ilustrativa" width="200">
  <img src="/img/analytics.svg" atl="Imagem Ilustrativa" width="200">
  <img src="/img/interactive.svg" alt="Imagem Ilustrativa" width="200">


</body>

</html>
